# ============================================================================
# Mooncake LMCache config — Prefiller 节点
# 占位符由 disagg_vllm_launcher.sh 启动时 sed 替换，生成到 /tmp/
#   {MASTER_IP}     — mooncake master IPv4 地址 (eth0 管理网卡)
#   {LOCAL_RDMA_IP} — 当前节点 IPv6 RDMA 地址 (bond 接口, 如 fd03:4514:80:6240::1)
#   {IB_DEVICES}    — IB HCA 设备列表 (如 mlx5_bond_0,...,mlx5_bond_3)
#
# 网络平面:
#   IPv4 (eth0/mlx5_0)         → remote_url / metadata_server / master_server_address
#   IPv6 (bond0~3/mlx5_bond_*) → local_hostname / device_name / protocol (RDMA)
# ============================================================================

chunk_size: 256
remote_url: "mooncakestore://{MASTER_IP}:50052/"
remote_serde: "naive"
local_cpu: False
max_local_cpu_size: 100

extra_config:
  local_hostname: "{LOCAL_RDMA_IP}"
  metadata_server: "http://{MASTER_IP}:8080/metadata"
  protocol: "rdma"
  device_name: "{IB_DEVICES}"                      # mlx5_bond_0,...,mlx5_bond_3
  master_server_address: "{MASTER_IP}:50052"
  global_segment_size: 64424509440                 # 60 GB (Qwen3-235B KV cache 较大)
  local_buffer_size:    4294967296                  # 4 GB per GPU
  transfer_timeout: 10
  save_chunk_meta: False
  # When KV head-NIC split is enabled, both the tail and head
  # connectors register segments on the *same* master. Without a
  # preferred_segment, master can cross-assign a tail put onto a
  # head segment (registered on mlx5_0) and the tail engine's RDMA
  # WRITE (mlx5_bond_*) would fail status=6 FAILED. Force local
  # so the tail client always gets a tail-device segment.
  mooncake_prefer_local_alloc: true
